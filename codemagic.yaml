# ──────────────────────────────────────────────────────────────────────
#  Breathy – Codemagic CI/CD Configuration
#  Build APK from your Android tablet browser via codemagic.io
# ──────────────────────────────────────────────────────────────────────

workflows:
  # ── Debug APK (no signing needed – easiest to test) ──────────────────
  android-debug:
    name: "Breathy Debug APK"
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - keystore_reference: BREATHY_DEBUG_KEYSTORE        # uploaded via UI
          keystore_password_reference: DEBUG_KEYSTORE_PASSWORD
          key_alias_reference: DEBUG_KEY_ALIAS
          key_password_reference: DEBUG_KEY_PASSWORD

      vars:
        PACKAGE_NAME: "com.breathy"
        GOOGLE_SERVICES_JSON: ""  # pasted in Encrypted Env Vars

      flutter: false  # native Android – not Flutter

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: "Set up local properties"
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: "Restore google-services.json"
        script: |
          # If you stored google-services.json as an env var:
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: "Get Gradle wrapper"
        script: |
          cd "$CM_BUILD_DIR"
          # Ensure gradlew exists and is executable
          chmod +x gradlew || true

      - name: "Build Debug APK"
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com   # ← replace with your email
        notify:
          success: true
          failure: true

  # ── Release APK (needs signing keystore) ────────────────────────────
  android-release:
    name: "Breathy Release APK"
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - keystore_reference: BREATHY_RELEASE_KEYSTORE       # uploaded via UI
          keystore_password_reference: RELEASE_KEYSTORE_PASSWORD
          key_alias_reference: RELEASE_KEY_ALIAS
          key_password_reference: RELEASE_KEY_PASSWORD

      vars:
        PACKAGE_NAME: "com.breathy"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release
          include: true

    scripts:
      - name: "Set up local properties"
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: "Restore google-services.json"
        script: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: "Build Release APK"
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com   # ← replace with your email
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
